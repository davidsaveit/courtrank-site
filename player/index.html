<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourtRank - View Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    p { color: #888; margin-bottom: 1.5rem; }
    .badge { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; background: #007AFF; }
  </style>
  <script>
    // Try to open the app via universal link
    // If app isn't installed, this page shows as fallback
    const path = window.location.pathname;
    const playerId = path.split('/player/')[1];
    if (playerId) {
      // App should handle this via universal links
      // If we're still here after 1 second, user doesn't have the app
      setTimeout(() => {
        document.getElementById('fallback').style.display = 'block';
      }, 500);
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>🏀 CourtRank</h1>
    <div id="fallback">
      <p>Download CourtRank to view this player's profile and challenge them!</p>
      <a href="https://apps.apple.com/app/courtrank/id6760328194" class="badge">Download on iOS</a>
    </div>
  </div>
</body>
</html>
